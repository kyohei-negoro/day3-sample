<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>集計結果 — 社内満足度アンケート</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>集計結果</h1>

      <div class="bar-row"><div class="bar-label">4</div><div class="bar-track"><div class="bar-fill" style="width:95%"></div></div><div class="bar-count">22人</div></div>
      <div class="bar-row"><div class="bar-label">3</div><div class="bar-track"><div class="bar-fill" style="width:38%"></div></div><div class="bar-count">8人</div></div>
      <div class="bar-row"><div class="bar-label">2</div><div class="bar-track"><div class="bar-fill" style="width:16%"></div></div><div class="bar-count">3人</div></div>
      <div class="bar-row"><div class="bar-label">1（不満）</div><div class="bar-track"><div class="bar-fill" style="width:6%"></div></div><div class="bar-count">1人</div></div>
    </div>
    <button class="secondary" onclick="location.href='index.html'">アンケートに戻る</button>
  </div>
</body>
</html>
