<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>週次売上レポート</title>
<link rel="stylesheet" href="style.css">
<style>
  .report-card { max-width: 640px; }
  .period { font-size: 13px; color: #718096; margin: 4px 0 20px; }
  .section-title { font-size: 14px; font-weight: 700; color: #1a365d; margin: 24px 0 10px; }
  .product-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .product-label { width: 60px; font-size: 12px; color: #4a5568; }
  .product-track { flex: 1; background: #f7fafc; border-radius: 3px; overflow: hidden; height: 22px; }
  .product-fill { background: #3182ce; height: 100%; }
  .product-value { width: 90px; font-size: 12px; font-weight: 700; color: #1a365d; text-align: right; }
  .line-chart { margin-top: 8px; }
  .summary { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 14px 16px; margin-top: 20px; font-size: 13px; line-height: 1.8; color: #2d3748; }
</style>
</head>
<body>
  <div class="card report-card">
    <h1>週次売上レポート</h1>
    <p class="period">集計対象期間：2026年7月6日（月）〜7月10日（金）</p>

    <div class="section-title">商品別 売上合計</div>
    <div class="product-row"><div class="product-label">商品A</div><div class="product-track"><div class="product-fill" style="width:100%"></div></div><div class="product-value">¥451,000</div></div>
    <div class="product-row"><div class="product-label">商品C</div><div class="product-track"><div class="product-fill" style="width:84%"></div></div><div class="product-value">¥379,000</div></div>
    <div class="product-row"><div class="product-label">商品B</div><div class="product-track"><div class="product-fill" style="width:64%"></div></div><div class="product-value">¥289,000</div></div>

    <div class="section-title">日別 売上推移</div>
    <svg class="line-chart" viewBox="0 0 560 160" width="100%" height="160">
      <polyline points="20,110 145,70 270,135 395,95 520,55" fill="none" stroke="#3182ce" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="110" r="4" fill="#1a365d"/>
      <circle cx="145" cy="70" r="4" fill="#1a365d"/>
      <circle cx="270" cy="135" r="4" fill="#1a365d"/>
      <circle cx="395" cy="95" r="4" fill="#1a365d"/>
      <circle cx="520" cy="55" r="4" fill="#1a365d"/>
      <text x="20" y="150" font-size="11" fill="#718096" text-anchor="middle">7/6</text>
      <text x="145" y="150" font-size="11" fill="#718096" text-anchor="middle">7/7</text>
      <text x="270" y="150" font-size="11" fill="#718096" text-anchor="middle">7/8</text>
      <text x="395" y="150" font-size="11" fill="#718096" text-anchor="middle">7/9</text>
      <text x="520" y="150" font-size="11" fill="#718096" text-anchor="middle">7/10</text>
    </svg>

    <div class="summary">
      <strong>まとめ：</strong>商品Aが週間合計¥451,000で最も好調でした。日別では7/10（金）が¥259,000と週内最高を記録し、週後半にかけて売上が伸びる傾向が見られます。7/8（水）はやや落ち込んでおり、要因の確認をおすすめします。
    </div>
  </div>
</body>
</html>
