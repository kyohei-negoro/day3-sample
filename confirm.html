<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>入力内容の確認 — 社内満足度アンケート</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>入力内容の確認</h1>
    <p class="sub">この内容で送信します。よろしいですか？</p>
    <dl class="review" id="review"></dl>
    <button id="submitBtn">この内容で送信する</button>
    <button class="secondary" onclick="location.href='index.html'">修正する</button>
    <p class="done" id="doneMsg" style="display:none">送信しました。ご協力ありがとうございました。</p>
  </div>
  <script>
    const data = JSON.parse(localStorage.getItem('survey') || '{}');
    const review = document.getElementById('review');
    function addRow(term, value) {
      const dt = document.createElement('dt');
      dt.textContent = term;
      const dd = document.createElement('dd');
      dd.textContent = value;
      review.appendChild(dt);
      review.appendChild(dd);
    }
    addRow('氏名', data.name || '-');
    addRow('部署', data.dept || '-');
    addRow('満足度', (data.score || '-') + ' / 5');
    document.getElementById('submitBtn').addEventListener('click', function () {
      this.style.display = 'none';
      document.getElementById('doneMsg').style.display = 'block';
      setTimeout(() => location.href = 'results.html', 1200);
    });
  </script>
</body>
</html>
